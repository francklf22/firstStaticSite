<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login - Love, Not War</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <svg class="bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
        <stop offset="0" stop-color="#ff9a9e"/>
        <stop offset="1" stop-color="#fecfef"/>
      </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#g)"/>
    <g fill="#fff" opacity="0.18">
      <path d="M200 150c0 35-28 63-63 63s-63-28-63-63c0-35 63-78 63-78s63 43 63 78z"/>
      <path d="M520 200c0 28-23 51-51 51s-51-23-51-51c0-28 51-62 51-62s51 34 51 62z" transform="translate(100,40)"/>
      <path d="M600 420c0 40-32 72-72 72s-72-32-72-72c0-40 72-90 72-90s72 50 72 90z" transform="translate(-30,-20)"/>
    </g>
    <g fill="#ff5a7a" opacity="0.9">
      <path d="M420 320c0 24-19 43-43 43s-43-19-43-43c0-24 43-55 43-55s43 31 43 55z"/>
    </g>
  </svg>

  <main>
    <h1>Login</h1>
    <form id="loginForm">
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Login</button>
    </form>
    <div id="message"></div>
    <p><a href="index.html">Back to Home</a></p>
  </main>
</body>
</html>
<script>
console.log('Login page loaded');
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  console.log('Form submitted:', { username, password });
  
  try {
    console.log('Sending request to http://localhost:5001/login');
    const response = await fetch('http://localhost:5001/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    console.log('Response status:', response.status);
    const result = await response.json();
    console.log('Response data:', result);
    document.getElementById('message').textContent = result.message;
    if (result.success) {
      console.log('Login successful, redirecting to dashboard');
      window.location.href = 'dashboard.html';
    } else {
      console.log('Login failed:', result.message);
    }
  } catch (error) {
    console.error('Fetch error:', error);
    document.getElementById('message').textContent = 'Error: ' + error.message;
  }
});
</script>
